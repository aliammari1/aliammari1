name: GitHub-Profile-3D-Contrib

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

# Least-privilege: only this job needs write access to commit generated SVGs.
permissions:
  contents: read

concurrency:
  # Serialize every workflow that commits to main so the scheduled
  # generators (3d-contrib, snake, metrics, featured-projects) never race.
  group: profile-commit-main
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    name: generate-github-profile-3d-contrib
    permissions:
      contents: write
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: yoshi389111/github-profile-3d-contrib@5b718734e8da645411919f0ae9ab9e7f9377158f # v0.9.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}

      - name: Commit & push (rebase-safe)
        run: |
          git config user.name aliammari1
          git config user.email ammari.ali.0001@gmail.com
          git add -A .
          if git commit -m "chore: update 3D contribution calendar"; then
            # Re-sync with main before pushing: the other scheduled
            # generators commit to the same branch on overlapping crons.
            git pull --rebase origin main
            git push
          fi
