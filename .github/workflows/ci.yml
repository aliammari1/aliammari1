name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    paths:
      - "README.md"
      - "**/*.md"
      - ".github/workflows/**"
      - ".markdownlint*"
  workflow_dispatch:
  schedule:
    # Weekly link-liveness sweep (badges/CDN hosts rot silently).
    - cron: "0 6 * * 1"

permissions:
  contents: read

jobs:
  markdownlint:
    name: markdownlint
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Lint markdown
        uses: DavidAnson/markdownlint-cli2-action@8de2aa07cae85fd17c0b35642db70cf5495f1d25 # v24.0.0
        with:
          globs: |
            **/*.md
            !profile-3d-contrib/**

  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Lint workflows
        uses: raven-actions/actionlint@3d39aea434753780c3b3d4a1a31c854b4dbf49d7 # v2.2.0

  links:
    name: lychee link check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Check links
        id: lychee
        uses: lycheeverse/lychee-action@e7477775783ea5526144ba13e8db5eec57747ce8 # v2.9.0
        with:
          args: >-
            --no-progress
            --exclude-path profile-3d-contrib
            --exclude-path metrics.svg
            README.md
          # On PR/push, fail the job on dead links. On the weekly schedule,
          # don't fail — instead open/update a tracking issue (below).
          fail: ${{ github.event_name != 'schedule' }}
          output: ./lychee/out.md
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Open or update dead-link tracking issue
        if: github.event_name == 'schedule' && steps.lychee.outputs.exit_code != 0
        uses: peter-evans/create-issue-from-file@fca9117c27cdc29c6c4db3b86c48e4115a786710 # v6.0.0
        with:
          title: "Dead links detected in README"
          content-filepath: ./lychee/out.md
          labels: |
            link-rot
            automated
