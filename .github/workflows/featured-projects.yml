name: Refresh Featured Projects

on:
  schedule:
    # Weekly, Monday 05:00 UTC. Offset from the asset generators so it
    # doesn't collide with their daily/12h crons.
    - cron: "0 5 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: profile-commit-main
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    env:
      # Skip the whole job (no error) when the key isn't configured.
      HAS_KEY: ${{ secrets.ANTHROPIC_API_KEY != '' }}
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node
        if: ${{ env.HAS_KEY == 'true' }}
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"

      - name: Rewrite Featured Projects blurbs
        if: ${{ env.HAS_KEY == 'true' }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OWNER: ${{ github.repository_owner }}
        run: node .github/scripts/refresh-featured-projects.mjs

      - name: Commit & push (rebase-safe)
        if: ${{ env.HAS_KEY == 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          if git commit -m "chore: refresh Featured Projects blurbs"; then
            git pull --rebase origin main
            git push
          fi
