name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize]

# Gated on ANTHROPIC_API_KEY: the job is skipped entirely on forks /
# when the secret is absent, so this never errors for contributors.
permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    env:
      HAS_KEY: ${{ secrets.ANTHROPIC_API_KEY != '' }}
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Claude review
        if: ${{ env.HAS_KEY == 'true' }}
        uses: anthropics/claude-code-action@a92e7c70a4da9793dc164451d829089dc057a464 # v1.0.159
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Review this pull request to the profile README repository.
            Focus on: workflow YAML correctness, action SHA-pinning hygiene,
            least-privilege permissions, and broken README links/badges.
            Keep feedback short and only flag real issues.
