version: 2
updates:
  # Keep the SHA-pinned GitHub Actions current. Dependabot understands
  # the `uses: owner/repo@<sha> # vX.Y.Z` form and bumps both the SHA
  # and the trailing version comment together.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"
    groups:
      actions:
        patterns:
          - "*"
