name: Refresh Featured Projects

on:
  schedule:
    # Weekly, Monday 05:00 UTC. Offset from the asset generators so it
    # doesn't collide with their daily/12h crons.
    - cron: "0 5 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: profile-commit-main
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    env:
      # Skip the whole job (no error) when the key isn't configured.
      HAS_KEY: ${{ secrets.ANTHROPIC_API_KEY != '' }}
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Node
        if: ${{ env.HAS_KEY == 'true' }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"

      - name: Rewrite Featured Projects blurbs
        if: ${{ env.HAS_KEY == 'true' }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OWNER: ${{ github.repository_owner }}
        run: node .github/scripts/refresh-featured-projects.mjs

      - name: Commit & push (rebase-safe)
        if: ${{ env.HAS_KEY == 'true' }}
        run: |
          git config user.name aliammari1
          git config user.email ammari.ali.0001@gmail.com
          git add README.md
          if git commit -m "chore: refresh Featured Projects blurbs"; then
            git pull --rebase origin main
            git push
          fi
